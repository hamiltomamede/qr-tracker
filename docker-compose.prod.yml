services:
  backend:
    build: ./backend
    environment:
      - PORT=3001
      - DB_PATH=/data
    volumes:
      - tracker-data:/data
    restart: unless-stopped
    networks:
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.http.routers.tracker-api.rule=Host(`tracker.hmtech.net.br`) && PathPrefix(`/api`, `/s`, `/r`)
      - traefik.http.routers.tracker-api.entrypoints=websecure
      - traefik.http.routers.tracker-api.tls.certresolver=letsencryptresolver
      - traefik.http.services.tracker-api.loadbalancer.server.port=3001

  frontend:
    build: ./frontend
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.http.routers.tracker.rule=Host(`tracker.hmtech.net.br`)
      - traefik.http.routers.tracker.entrypoints=websecure
      - traefik.http.routers.tracker.tls.certresolver=letsencryptresolver
      - traefik.http.services.tracker.loadbalancer.server.port=80

volumes:
  tracker-data:

networks:
  traefik-public:
    external: true
